<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINEスタンプピッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f0f4f8; color: #1a1a2e; min-height: 100vh; }

  .header {
    background: #06C755;
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(6,199,85,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 900; flex: 1; }
  .header-count { background: white; color: #06C755; font-weight: 700; font-size: 14px; padding: 4px 14px; border-radius: 20px; }

  .controls {
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .upload-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    padding: 40px 20px;
  }

  .upload-box {
    border: 3px dashed #06C755;
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
    max-width: 420px;
    width: 100%;
  }
  .upload-box:hover { background: #f0fff4; transform: scale(1.02); }
  .upload-icon { font-size: 56px; margin-bottom: 16px; }
  .upload-box h2 { font-size: 20px; font-weight: 700; color: #06C755; margin-bottom: 10px; }
  .upload-box p { font-size: 14px; color: #666; line-height: 1.8; }
  #fileInput { display: none; }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .btn-green { background: #06C755; color: white; }
  .btn-green:hover { background: #05a847; }
  .btn-blue { background: #4495C1; color: white; }
  .btn-blue:hover { background: #357aa3; }
  .btn-gray { background: #e0e0e0; color: #333; }
  .btn-gray:hover { background: #ccc; }
  .btn-red { background: #e74c3c; color: white; }
  .btn-red:hover { background: #c0392b; }
  .btn-purple { background: #9B59B6; color: white; }
  .btn-purple:hover { background: #7d3c98; }

  .filter-select {
    padding: 7px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    background: white;
  }

  .selected-info { margin-left: auto; font-size: 13px; color: #555; font-weight: 700; }
  .selected-info span { color: #06C755; font-size: 16px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 12px;
    padding: 16px;
  }

  .sticker-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.15s;
    border: 3px solid transparent;
    position: relative;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .sticker-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
  .sticker-card.selected { border-color: #06C755; box-shadow: 0 0 0 2px rgba(6,199,85,0.3); }
  .sticker-card.selected::after {
    content: '✓';
    position: absolute;
    top: 6px; right: 6px;
    width: 24px; height: 24px;
    background: #06C755;
    color: white;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 900;
    line-height: 24px;
    text-align: center;
  }

  .sticker-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: #f5f5f5;
  }

  .sticker-info { padding: 8px; }
  .sticker-title {
    font-size: 10px; color: #333; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .sticker-cat { font-size: 9px; color: #999; margin-top: 3px; }
  .kind-badge {
    display: inline-block;
    font-size: 8px;
    background: #fff3cd;
    color: #856404;
    border-radius: 4px;
    padding: 1px 4px;
    margin-top: 2px;
  }

  .output-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid #06C755;
    padding: 12px 16px;
    z-index: 200;
    display: none;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
  }
  .output-panel.visible { display: block; }
  .output-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .output-header h3 { font-size: 14px; font-weight: 700; flex: 1; }
  .output-textarea {
    width: 100%; height: 80px;
    border: 1px solid #ddd; border-radius: 8px;
    padding: 8px; font-size: 11px;
    resize: none; font-family: monospace;
    background: #f9f9f9;
  }
  .copy-success { color: #06C755; font-size: 12px; font-weight: 700; display: none; }
  .empty-state { text-align: center; padding: 60px 20px; color: #999; font-size: 14px; }
  .bottom-spacer { height: 160px; }

  /* ドラッグオーバー */
  body.drag-over .upload-box { background: #f0fff4; border-color: #05a847; }
</style>
</head>
<body>

<div class="header">
  <span>🛒</span>
  <h1>LINEスタンプピッカー</h1>
  <div class="header-count" id="totalCount">0件</div>
</div>

<div id="uploadArea" class="upload-area">
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📂</div>
    <h2>CSVをアップロード</h2>
    <p>LINEショップスキャナーで出力した<br>CSVファイルをここにドロップ<br>またはクリックして選択</p>
  </div>
  <input type="file" id="fileInput" accept=".csv">
</div>

<div id="mainArea" style="display:none">
  <div class="controls">
    <button class="btn btn-gray" onclick="resetPicker()">🔄 リセット</button>
    <button class="btn btn-gray" onclick="document.getElementById('fileInput').click()">📂 CSV変更</button>
    <select class="filter-select" id="catFilter" onchange="renderGrid()">
      <option value="">すべて</option>
      <option value="スタンプ">スタンプ</option>
      <option value="絵文字">絵文字</option>
      <option value="着せ替え">着せ替え</option>
    </select>
    <button class="btn btn-gray" onclick="clearSelection()">選択解除</button>
    <button class="btn btn-red" onclick="randomSelect(20)">🎲 ランダム20</button>
    <button class="btn btn-purple" onclick="randomSelect(10)">🎲 ランダム10</button>
    <div class="selected-info">選択中: <span id="selectedCount">0</span>件</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="bottom-spacer"></div>
</div>

<div class="output-panel" id="outputPanel">
  <div class="output-header">
    <h3>📋 URL一覧 (<span id="outputCount">0</span>件)</h3>
    <span class="copy-success" id="copySuccess">✅ コピー完了！</span>
    <button class="btn btn-blue" onclick="copyUrls('shop')">🌐 ショップURL</button>
    <button class="btn btn-green" onclick="copyUrls('line')">📱 LINEアプリURL</button>
  </div>
  <textarea class="output-textarea" id="outputText" readonly placeholder="スタンプを選択するとURLが表示されます"></textarea>
</div>

<script>
let allStickers = [];
let selected = new Set();

function getThumbnail(shopUrl, imageUrl) {
  if (!shopUrl) return '';
  if (shopUrl.includes('/themeshop/')) return imageUrl || '';
  if (shopUrl.includes('/emojishop/')) {
    const m = shopUrl.match(/\/product\/([^\/]+)\//);
    if (m) return `https://stickershop.line-scdn.net/sticonshop/v1/product/${m[1]}/iPhone/main.png`;
  }
  if (shopUrl.includes('/stickershop/')) {
    const m = shopUrl.match(/\/product\/(\d+)\//);
    if (m) return `https://stickershop.line-scdn.net/stickershop/v1/product/${m[1]}/LINEStorePC/main.png`;
  }
  return '';
}

function generateLineUrl(shopUrl) {
  if (!shopUrl) return '';
  if (shopUrl.includes('/themeshop/')) {
    const m = shopUrl.match(/\/product\/([0-9a-f-]+)\//);
    if (m) return `https://line.me/S/shop/theme/detail?id=${m[1]}`;
    return '';
  }
  const m = shopUrl.match(/\/product\/([0-9a-f-]+)\//);
  if (!m) return '';
  if (shopUrl.includes('/emojishop/')) return `https://line.me/S/emoji/?id=${m[1]}`;
  return `https://line.me/S/sticker/${m[1]}`;
}

function kindLabel(kind) {
  if (!kind) return '';
  const map = {
    'animation-sticker-icon':       'アニメ',
    'animation-sticon-icon':        'アニメ絵文字',
    'popup-effect-sticker-icon':    'ポップアップ',
    'message-sticker-icon':         'メッセージ',
    'name-sticker-icon':            'カスタム',
  };
  const label = map[kind] || kind.replace(/-icon$/, '');
  return `<div class="kind-badge">${label}</div>`;
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += c;
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r['タイトル']);
}

function loadCSV(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    allStickers = parseCSV(ev.target.result);
    selected.clear();
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('mainArea').style.display = 'block';
    document.getElementById('totalCount').textContent = allStickers.length + '件';
    renderGrid();
    updateOutput();
  };
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadCSV(e.target.files[0]);
});

document.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-over'); });
document.addEventListener('dragleave', () => document.body.classList.remove('drag-over'));
document.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.csv')) loadCSV(file);
});

function renderGrid() {
  const cat = document.getElementById('catFilter').value;
  const filtered = cat ? allStickers.filter(s => s['カテゴリ'] === cat) : allStickers;
  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">該当するスタンプがありません</div>';
    return;
  }
  grid.innerHTML = filtered.map(s => {
    const id = allStickers.indexOf(s);
    const shopUrl = s['ショップURL'] || '';
    const imageUrl = s['画像URL'] || '';
    const thumb = getThumbnail(shopUrl, imageUrl);
    const isSel = selected.has(id);
    return `<div class="sticker-card ${isSel?'selected':''}" onclick="toggleSelect(${id})">
      <img class="sticker-img" src="${thumb}" alt="${s['タイトル']}" loading="lazy" onerror="this.src='';this.style.background='#eee';this.style.minHeight='100px'">
      <div class="sticker-info">
        <div class="sticker-title">${s['タイトル']}</div>
        <div class="sticker-cat">${s['カテゴリ']||''}${kindLabel(s['種別']||'')}</div>
      </div>
    </div>`;
  }).join('');
}

function resetPicker() {
  allStickers = [];
  selected.clear();
  document.getElementById('fileInput').value = '';
  document.getElementById('mainArea').style.display = 'none';
  document.getElementById('uploadArea').style.display = 'flex';
  document.getElementById('totalCount').textContent = '0件';
  document.getElementById('selectedCount').textContent = '0';
  document.getElementById('outputPanel').classList.remove('visible');
  document.getElementById('outputText').value = '';
  document.getElementById('catFilter').value = '';
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  document.getElementById('selectedCount').textContent = selected.size;
  updateOutput();
  renderGrid();
}

function clearSelection() {
  selected.clear();
  document.getElementById('selectedCount').textContent = 0;
  updateOutput();
  renderGrid();
}

function randomSelect(n) {
  const cat = document.getElementById('catFilter').value;
  const pool = allStickers.map((_,i)=>i).filter(i => !cat || allStickers[i]['カテゴリ']===cat);
  selected.clear();
  pool.sort(()=>Math.random()-0.5).slice(0,n).forEach(i=>selected.add(i));
  document.getElementById('selectedCount').textContent = selected.size;
  updateOutput();
  renderGrid();
}

function updateOutput() {
  const panel = document.getElementById('outputPanel');
  const count = selected.size;
  document.getElementById('outputCount').textContent = count;
  if (count === 0) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');
  const urls = [...selected].map(i => allStickers[i]['ショップURL']||'').filter(Boolean);
  document.getElementById('outputText').value = urls.join('\n');
}

function copyUrls(type) {
  let urls;
  if (type === 'line') {
    urls = [...selected].map(i => {
      const s = allStickers[i];
      return s['LINEアプリURL'] || generateLineUrl(s['ショップURL']||'') || s['ショップURL'] || '';
    }).filter(Boolean);
  } else {
    urls = [...selected].map(i => allStickers[i]['ショップURL']||'').filter(Boolean);
  }
  const text = urls.join('\n');
  document.getElementById('outputText').value = text;
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copySuccess');
    el.style.display = 'inline';
    setTimeout(() => el.style.display = 'none', 2000);
  });
}
</script>
</body>
</html>
